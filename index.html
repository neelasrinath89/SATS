/* PRODUCTS */
.products {

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
