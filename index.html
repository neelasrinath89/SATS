/* HERO WITH BACKGROUND */

.hero {
    height: 100vh;
    background: url('images/bg.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* DARK OVERLAY */
.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
}
/* CONTENT ABOVE OVERLAY */
.hero-content {

}

/* LOGO */
.logo {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* PRODUCTS */
.products {
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 22px;
    color: white;
    text-decoration: none;
}

</style>
</head>
